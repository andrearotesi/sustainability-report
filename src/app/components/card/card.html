<header class="internal-padding">
  <ng-content select="[card-subtitle]" />
  <ng-content select="[card-title]" />
</header>

<div class="internal-padding">
  <ng-content select="[card-body]" />
</div>

@if (imageConfig(); as imageConfig) {
  <img aria-label="Card image" title="Card image" [src]="imageConfig.url" [alt]="imageConfig.alt">
}
