<div class="items-container" #itemsContainer>
  <div class="items">
    <ng-content select="[carousel-item]" />
  </div>
</div>

<div class="actions-container">
  @for (action of scrollAction; track $index) {
    <button class="pr-icon-button" (click)="scrollItems(action.direction)">
      <fa-icon [icon]="action.icon" />
    </button>
  }
</div>
