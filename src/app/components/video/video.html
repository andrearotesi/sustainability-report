<video
  #videoRef
  (click)="toggleVideo()"
  (keydown.enter)="toggleVideo()"
  [src]="src()"
  muted
  autoplay
  loop
  type="video/mp4"
></video>

<!-- TODO to all buttons, add aria label and that stuff for accessibility -->
<button class="pr-icon-button" (click)="toggleVideo()">
  <fa-icon [icon]="toggleIcon()" />
</button>
